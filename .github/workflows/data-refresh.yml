name: Data Refresh

# Daily after-US-close pipeline (plan.md Phase C): public market/news/meta
# JSON committed to the repo; private IBKR snapshots + AI brief upserted to
# Supabase. Dual cron — 22:30 UTC after close, 09:30 UTC next morning as the
# same-day retry for late IBKR Flex generation (also absorbs DST drift).
# Every step is guarded: a missing secret is a visible notice + clean no-op,
# never a cryptic crash. Domain steps run even when an earlier domain failed
# (partial refresh per FR-D4); any failure emails via notify-fail.js.
#
# The data commit to main is the sanctioned bot-data-commit exception (same
# standing as keepalive.yml); code changes still go through PRs. `[skip ci]`
# keeps the daily commit from burning a QA run.

on:
  schedule:
    - cron: '30 22 * * 1-5'   # after US close, weekdays
    - cron: '30 9 * * 2-6'    # next-morning retry (IBKR Flex is often T+1)
  workflow_dispatch:
    inputs:
      backfill:
        description: 'One-time ~1Y IBKR equity-history backfill (SC-4)'
        type: boolean
        default: false
      force_fail_market:
        description: 'SC7 test only: point the market fetch at an invalid host'
        type: boolean
        default: false

permissions:
  contents: write   # the data commit; everything else is read-only

concurrency:
  group: data-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    # generous: Yahoo 429 cooldowns + Flex transient retries are bounded by
    # in-script circuit breakers, but the job must ALWAYS reach the meta/
    # commit/notify steps rather than die at the timeout
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .github/scripts/refresh
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/refresh/package-lock.json

      - name: Install deps
        # ../ = .github/scripts (nodemailer) for the notify-email.js bridge
        run: npm ci && npm ci --prefix ..

      - name: Unit tests (fixtures)
        run: npm test

      # Heatmap runs FIRST among the Yahoo consumers: its crumb path needs only
      # ~5 calls, while later steps' per-symbol fallbacks can trip Yahoo's
      # per-IP throttle for the rest of the job (observed run 29135632333).
      - name: Fetch S&P 500 heatmap (screener + Yahoo fallbacks)
        if: ${{ !cancelled() }}
        env:
          SCREENER_BASE_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
          MARKET_FALLBACK_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
        run: node fetch-heatmap.js


      - name: Fetch market summary (Stooq + FRED)
        if: ${{ !cancelled() }}
        env:
          # SC7 drill overrides BOTH quote sources so the fallback can't rescue it
          MARKET_BASE_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
          MARKET_FALLBACK_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
        run: node fetch-market.js

      # Sequential Stooq CSVs (Yahoo chart fallback per symbol) for the
      # charts-panel watchlist; runs after market so a Stooq limit surfaces
      # there first with fewer wasted calls.
      - name: Fetch chart histories (watchlist OHLCV)
        if: ${{ !cancelled() }}
        env:
          MARKET_BASE_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
          MARKET_FALLBACK_URL: ${{ inputs.force_fail_market == true && 'https://invalid.invalid' || '' }}
        run: node fetch-charts.js

      # Extra MAP FILTER universes (crypto/futures/world) are NOT fetched
      # nightly anymore — the desk-maps edge function serves them as delayed
      # quotes on demand (owner ruling 2026-07-13; runner IPs were hard-429'd
      # by Yahoo on every path).

      - name: Fetch news (RSS + fallbacks)
        if: ${{ !cancelled() }}
        env:
          DB_URL: ${{ vars.DB_URL }}
          DB_SERVICE_KEY: ${{ secrets.DB_SERVICE_KEY }}
        run: node fetch-news.js

      - name: Fetch IBKR snapshots (Flex → Supabase)
        if: ${{ !cancelled() }}
        env:
          IBKR_FLEX_TOKEN: ${{ secrets.IBKR_FLEX_TOKEN }}
          IBKR_FLEX_QUERY_ID: ${{ secrets.IBKR_FLEX_QUERY_ID }}
          IBKR_FLEX_BACKFILL_QUERY_ID: ${{ secrets.IBKR_FLEX_BACKFILL_QUERY_ID }}
          IBKR_ACCOUNT_MAP: ${{ vars.IBKR_ACCOUNT_MAP }}
          DB_URL: ${{ vars.DB_URL }}
          DB_SERVICE_KEY: ${{ secrets.DB_SERVICE_KEY }}
          # renew-token notice goes straight to email (actionable, never silent)
          ALERT_TO: ${{ vars.ALERT_TO || vars.SMTP_USER }}
          ALERT_FROM: ${{ vars.ALERT_FROM }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node fetch-ibkr.js ${{ inputs.backfill == true && '--backfill' || '' }}

      - name: Generate AI brief (Anthropic)
        if: ${{ !cancelled() }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRIEF_MODEL: ${{ vars.BRIEF_MODEL }}
          DB_URL: ${{ vars.DB_URL }}
          DB_SERVICE_KEY: ${{ secrets.DB_SERVICE_KEY }}
        run: node generate-brief.js

      - name: Write meta.json
        if: ${{ !cancelled() }}
        run: node write-meta.js

      - name: Commit public data
        if: ${{ !cancelled() }}
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "data-refresh-bot"
          git config user.email "data-refresh@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git commit -m "data: scheduled refresh $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          # rebase-retry ×3 survives a race with a concurrently merged PR
          for i in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            echo "push attempt $i failed — rebasing onto latest main"
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }
            sleep $((i * 5))
          done
          exit 1

      - name: Notify on failure
        if: ${{ failure() }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALERT_TO: ${{ vars.ALERT_TO || vars.SMTP_USER }}
          ALERT_FROM: ${{ vars.ALERT_FROM }}
          SMTP_HOST: ${{ vars.SMTP_HOST }}
          SMTP_PORT: ${{ vars.SMTP_PORT }}
          SMTP_USER: ${{ vars.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
        run: node notify-fail.js
